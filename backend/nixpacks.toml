# Nixpacks config for Railway deployment
# Ensures system-level audio libraries are available for librosa/soundfile

[phases.setup]
nixPkgs = ["python311", "ffmpeg", "libsndfile"]

[phases.install]
cmds = ["pip install -r Requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 2"
